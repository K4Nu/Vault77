{% extends "base.html" %}

{% block layout %}
<div class="container mt-5">
    <h2>Categories</h2>

    <ul class="list-group">
        {% for category in categories %}
            {% include "products/category_item.html" with category=category %}
        {% empty %}
            <li class="list-group-item">No categories available.</li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
