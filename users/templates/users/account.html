{% extends 'users/account_base.html' %}
<head>
    <script src="https://unpkg.com/htmx.org@1.9.2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
{% block account_content %}
<div class="col-md-9">
    <div class="card">
        <div class="card-header">
            <h1 class="card-title">{{ user.firstname }}'s Account</h1>
        </div>
        <div class="card-body">
            <!-- Combined Section: First Name, Last Name, Phone -->
            <div class="mb-3 p-3 border rounded bg-light">
                <div class="mb-2">
                    <strong>First Name:</strong> {{ user.firstname }}
                </div>
                <div class="mb-2">
                    <strong>Last Name:</strong> {{ user.lastname }}
                </div>
                <div class="mb-2">
                    <strong>Phone:</strong> {{ user.phone_number }}
                </div>

                <!-- Edit Button with Pencil Icon -->
                <div class="mt-3">
                    <a href="#" class="btn btn-primary" data-toggle="modal" data-target="#editModal">
                        <i class="fas fa-pencil-alt"></i> Edit
                    </a>
                </div>
            </div>

            <!-- New Div 1: Email -->
            <hr>
            <div class="mb-3 p-3 border rounded bg-info text-white">
                <strong>Email:</strong> {{ user.email }}
            </div>
            <hr>

            <!-- New Div 2: Password -->
            <div class="mb-3 p-3 border rounded bg-warning">
                <strong>Password:</strong> ********
            </div>

            <!-- Button to trigger the password change modal -->
            <div class="mt-3">
                <a href="{% url 'change_password' %}"
                   class="btn btn-primary"
                   hx-get="{% url 'change_password' %}"
                   hx-target="#passwordChangeModal .modal-body"
                   hx-trigger="click"
                   data-toggle="modal"
                   data-target="#passwordChangeModal">
                    <i class="fas fa-pencil-alt"></i> Change Password
                </a>
            </div>
        </div>
    </div>
</div>

<!-- Modal Structure for Password Change -->
<div class="modal fade" id="passwordChangeModal" tabindex="-1" role="dialog" aria-labelledby="passwordChangeModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="passwordChangeModalLabel">Change Password</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <!-- HTMX will load the password change form here dynamically -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}
