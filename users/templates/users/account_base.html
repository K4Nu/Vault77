{% extends 'base.html' %}

{% block layout %}
<div class="container mt-4">
    <div class="row">
        <!-- Sidebar Section -->
        <div class="col-md-3">
            <div class="list-group">
               <a href="{% url 'account' %}" class="list-group-item list-group-item-action {% if section == 'account' %}active{% endif %}">
                    Account
                </a>
                <a href="#" class="list-group-item list-group-item-action {% if section == 'orders' %}active{% endif %}">
                    Orders
                </a>
                <a href="#" class="list-group-item list-group-item-action {% if section == 'wishlist' %}active{% endif %}">
                    Wishlist
                </a>
                <a href="#" class="list-group-item list-group-item-action {% if section == 'notifications' %}active{% endif %}">
                    Notifications
                </a>
            </div>
        </div>

        <!-- Content Section -->
        <div class="col-md-9">
            {% block account_content %}
            <!-- Specific page content will go here -->
            {% endblock %}
        </div>
    </div>
</div>
{% endblock %}
