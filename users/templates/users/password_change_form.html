{% load widget_tweaks %}

{% block content %}
<div class="container-fluid mt-12">
    <div class="row justify-content-center">
                <div class="card-body">
                    <form id="passwordChangeForm" method="POST" hx-post="{% url 'change_password' %}" hx-target="#passwordChangeModal .modal-body" hx-swap="outerHTML">
                        {% csrf_token %}

                        <!-- Current Password Field -->
                        <div class="form-group">
                            <label for="current_password" class="form-label">Current Password</label>
                            {{ form.current_password|add_class:"form-control" }}
                        </div>

                        <!-- New Password Field -->
                        <div class="form-group">
                            <label for="new_password1" class="form-label">New Password</label>
                            {{ form.new_password1|add_class:"form-control" }}
                        </div>

                        <!-- Confirm New Password Field -->
                        <div class="form-group">
                            <label for="new_password2" class="form-label">Confirm New Password</label>
                            {{ form.new_password2|add_class:"form-control" }}
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-primary btn-block mt-2">Change Password</button>
                    </form>
                </div>
            </div>
        </div>
{% endblock %}
