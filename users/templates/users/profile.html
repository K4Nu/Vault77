{% extends 'base.html' %}
{% load widget_tweaks %}

{% block title %}
<title>Profile</title>
{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto mt-10 p-6 bg-white shadow-md rounded-lg">
<h1 class="text-2xl font-bold text-gray-800 mb-6">
    Hey {{ object.first_name }} {{ object.last_name }}
    {% if object.image %}
    <img src="{{ object.image.url }}" alt="" class="w-20 h-20 object-cover rounded-full">
    {% endif %}
</h1>

</div>
{% endblock %}
