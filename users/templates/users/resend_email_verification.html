{% extends 'base.html' %}
{% load widget_tweaks %}

{% block content %}
<div class="max-w-md mx-auto mt-10 p-6 bg-white shadow-md rounded-lg">
    <h2 class="text-2xl font-semibold text-gray-700 mb-6">Resend Email Verification</h2>

    <form method="post" action="{% url 'users:resend_email_verification' %}" class="space-y-4">
        {% csrf_token %}
        <div>
            <label for="email" class="block text-sm font-medium text-gray-600">Email Address:</label>
            <input
                type="email"
                id="email"
                name="email"
                class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 text-gray-700"
                placeholder="Enter your email"
                required>
        </div>
            <div class="flex justify-center mt-4">
        <button
            type="submit"
            class="w-64 bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded-lg shadow-md focus:outline-none focus:ring-2 focus:ring-blue-400">
            Resend Verification Email
        </button>
            </div>
    </form>

    <!-- Display Django messages -->
    <div class="mt-6 space-y-4">
        {% if messages %}
            {% for message in messages %}
                <div
                    class="p-4 rounded-lg shadow-sm
                        {% if message.tags == 'success' %}bg-green-100 text-green-800
                        {% elif message.tags == 'error' %}bg-red-100 text-red-800
                        {% elif message.tags == 'info' %}bg-blue-100 text-blue-800
                        {% else %}bg-gray-100 text-gray-800{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    </div>
</div>
{% endblock %}
