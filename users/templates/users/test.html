{% extends 'base.html' %}
{% block content %}
<div class="container mx-auto p-6">
    <h1 class="text-2xl font-semibold mb-4">Test Modal</h1>

    <!-- Modal Trigger Button -->
    <button class="btn" onclick="my_modal_3.showModal()">Open Password Change Modal</button>

    <!-- Modal -->
    <dialog id="my_modal_3" class="modal">
        <div class="modal-box">
            <!-- Modal Close Button -->
            <form method="dialog">
                <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
            </form>

            <!-- HTMX Form (Already Loaded) -->
            <h3 class="text-lg font-bold mb-4">Change Password</h3>
            <div id="password-form-container">
                {% include "account/password_reset_form_partial.html" %}
            </div>
        </div>
    </dialog>
</div>

<script>
    // Listen for HTMX afterRequest event
    document.addEventListener('htmx:afterRequest', function(e) {
        // Check if the response contains success=true
            // Close the modal
            document.getElementById('my_modal_3').close();

            // Optional: Show an alert

    });
</script>

{% endblock %}
